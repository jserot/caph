    <meta name="description" content="CAPH : A domain specific language for implementing stream-processing applications on reconfigurable hardware J. Sérot Institut Pascal UMR 6602 Université Blaise Pascal / CNRS Clermont-Ferrand, France  DSLDI Workshop                                                 01/07/2013, Montpellier Context and motivations Multiplication of FPGAs in embedded systems  FPGA = Field Programmable Gate Arrays Alternative solution (vs CPUs) for implementing software in hardware full and complete customization of hardware to realize a specific program Programming means configuring specialize the function of Logic Elements configure the communication wires btw LEs FPGAs - Opportunities 530K equiv logic elements 430K registers 20Mb embedded memory 1024 18x18 multipliers Ex: ALTERA Stratix IV™ ➜ close-to-sensor, on-the-fly, processing  ➜ huge amount of fine grain parallelism FPGAs - Obstacles  FPGAs are programmed with hardware description languages (Verilog, VHDL) A real challenge for “software” programmers ! explicit parallelism, explicit time, explicit control signals requires knowledge on hardware design High-level synthesis tools (ex: C-based HDLs) may help but Some concepts of the sequential / imperative programming model do no map easily/efficiently into hardware  Requires complex (and hence hard to prove correct) transformations to be implemented DSLs ? Whether HLS tools may ultimately offer a fully transparent and efficient compilation path is still a open (and debated !) question ! Meanwhile, DSLs can offer a pragmatic solution :  using an specific model of computation is a way of reducing the gap between high level specifications and low-level implementations  ... esp. when the application domain is restricted ... but also leading to efficient hardware implementations  CAPH A DSL for implementing real-time, stream-processing applications Based upon the data-flow model of computation Generating efficient VHDL code for programming FPGA-based platforms Dataflow model 4 Very old idea ! An application = a network of computing units (actors) exchanging tokens through unidirectional, buffered links (FIFOs)  For each actor, a set of firing rules specifies when it consumes input tokens and produces output tokens  15 Dataflow model Very intuitive model (esp. for pgmers in the DSP field) Can be easily implemented in hardware : channels as FIFOs actors as independent synchronous/asynchronous processes  no global synchronization / control ! ☺ natural support of pipelining and on-the-fly  processing ☺ control signals can be embedded as special data tokens ☺ From model to language Need a formalism to describe / specify the topology of the actor network the behavior of individual actors what tokens contain / represent Describing networks net o = A4 (x1, y1) ➢ Consistency can be checked using type-checking ➢ Reusable graph patterns can be encapsulated as higher-order functions ➔ Textual (functional) description Describing actor behavior Behavior described a a set of transition rules Activation of rules based on pattern-matching 8 9 8 4 5 6 4 9 4 ➔ Generalized Finite State Machines actor switch  in (i1 : int,      i2 : int)  out (o : int)  var s : (Left,Right) = Left  rules   | s:Left,  i1:v → o:v, s:Right  | s:Right, i2:v → o:v, s:Left Data representation Key issue for stream-processing applications Synchronisation problems are partly solved by using FIFOs to connect actors ... ... but we still need to represent the structure of the processed data ex: detect start/end_of_frame and start/end_of_line in a stream of images Data representation Two categories of tokens  data tokens (integers, booleans, pixels, ...) control tokens (start_of_structure, end_of_structure) ➢ Can be used to represent arbitrarily structured data (the Lispish way...) ➢ No global control / synchronisation signals needed  ➢ Naturally supports pipelined execution &lt; &lt; &gt; &gt; function f_abs x =   if x &lt; 0 then 0-x else x  : signed&lt;8&gt; -&gt; signed&lt;8&gt;;constant threshold = 40;actor d1p () ...actor d1l () ... actor add () ...actor asub () ... actor thr (t:signed&lt;8&gt;) ...stream i:signed&lt;8&gt; dc from &quot;dev:cam0&quot;;stream o:signed&lt;8&gt; dc to &quot;dev:mon1&quot;;net g = add (asub(i, d1p i), asub(i, d1l i));net o = thr [threshold] g; A sample Caph program The Caph toolset Graph visualizer : .dot format Reference interpreter : based on the fully formalized semantics tracing, profiling and debugging Compiler :  elaboration of a target-independant IR specialized backends (SystemC, VHDL) Elaboration Three steps network generation RT-level description of actors SystemC/VHDL transcription Only a quick overview here (see papers &amp; LRM) I. Network generation Using abstract interpretation of the network description, viewed as a functional program Each application of a function bound to an actor inserts an instance of this actor into the graph Each functional dependency inserts a channel channels are then instanciated as FIFOs net y = f ( g x) II.  Translation of actor to RTL actor suml ()  in (a: int dc) out (c: int) var st: {S0,S1}=S0 var s : int rules   st:S0, a:‘&lt; ➔ st:S1, s:0 | st:S1, a:‘v ➔ st:S1, s:s+v | st:S1, a:‘&gt; ➔ st:S0, c:s Example :         suml : &lt; 1 2 3 &gt; = 6 Set of transition rules → FSM + operations (FSMD)  ...   begin    if (reset='0') then      st := S0; a_rd &lt;= '0'; c_wr &lt;= '0';    elsif rising_edge(clock) then      case state is        when S0 =&gt;          if a_empty='0' and is_sos(a) then            a_rd &lt;= '1';            st := S01;            s := conv_std_logic_vector(0,15);            end if;        when S01 =&gt;            a_rd &lt;= '0'; state &lt;= S1;        when S1 =&gt;          if a_empty='0' and is_data(a) then            a_rd &lt;= '1'; v := data_from(a);            s := s+v; st := S11;            end if;          if a_empty='0' and is_eos(a) then            a_rd &lt;= '1'; c := s;            c_wr &lt;= '1'; st := S12;            end if;        when S11 =&gt;            a_rd &lt;= '0'; st := S1;        when S12 =&gt;            a_rd &lt;= '0'; c_wr &lt;= '0'; st := S0;      end case;    end if;  end process;end FSM; actor suml ()  in (a: int dc) out (c: int) var st: {S0,S1}=S0 var s : int rules st,a,s-&gt; st,c,s   S0,'&lt;,_ ➔ S1,_,0 | S1,'v,s ➔ S1,_,s+v | S1,'&gt;,s ➔ S0,s,_  III. VHDL Transcription Example entity sum_act is   port (    a_empty: in std_logic;    a: in std_logic_vector(9 downto 0);    a_rd: out std_logic;    c_full: in std_logic;    c: out std_logic_vector(15 downto 0);    c_wr: out std_logic;    clock: in std_logic;    reset: in std_logic    );end sum_act;architecture FSM of sum_act is    type t_state is (S0,S01,S1,S11,S12);begin  process(clock, reset)    variable s : std_logic_vector(15 downto 0);    variable st : t_state;    variable v : std_logic_vector(7 downto 0); ... III. Synthesis (RT-level → Gate level) Using vendor-specific tool-chains  Example :  suml actor synthetized on a Stratix IV using Altera Quartus 9 Implementation ~ 15000 loc of OCaml  lexer+parser : ~ 3500 type checker : ~1800 SystemC backend : ~1800 VHDL backend : ~ 2000 Extra features Higher-order wiring functions net diamond (f, g, h, k, x) =   let x,y = f i in   k (g x, h y)   net o = diamond (A1, A2, A3, A4, i) Parametric polymorphism ☹  Parametric polymorphism actor mux  in (e1:$t,       e2: $t,       c:bool) out (s: $t)rules | e1:x, c:true -&gt; s:x | e2:x, c:false -&gt; s:x; Implementation :  - SystemC templates - VHDL replicated code User-defined algebraic data  Higher-order actors actor inc  in (e:signed&lt;8&gt;)  out (s: signed&lt;8&gt;)rules | x -&gt; x+1 ;  net o = inc i ☹  actor double  in (e:signed&lt;8&gt;)  out (s: signed&lt;8&gt;)rules | x -&gt; x*2 ;  net o = double i Higher-order actors ☺ Dependant types Current state of the project Prototype compiler based upon formal semantics + language reference manual available athttp://dream.univ-bpclermont.fr/index.php/softmenu/caph Has been used to implement several substantial image processing applications on real hardware (ex: a smart camera platform equiped with a Stratix EP1S60 FPGA) showed substantial increase in abstraction level (and development time !) compared to VHDL/Verilog without significant performance penalty"/>
